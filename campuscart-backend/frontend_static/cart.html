<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Your Cart — CampusCart</title>
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/layout.css" />
    <link rel="stylesheet" href="css/components.css" />
    <link rel="stylesheet" href="css/theme.css" />
    <style>
      .cart-page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:2rem}
      .cart-page-header h1{font-family:var(--font-display);font-size:1.8rem;font-weight:800;letter-spacing:-.03em;color:var(--text)}
      .cart-table{display:flex;flex-direction:column;gap:.6rem}
      .cart-row{display:grid;grid-template-columns:3fr 1fr 1fr 1fr 1fr;gap:1rem;align-items:center;padding:1rem 1.25rem;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);transition:border-color var(--transition)}
      .cart-row:hover{border-color:rgba(108,99,255,.2)}
      .cart-header{background:transparent;border:none;color:var(--text-3);font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;padding:.5rem 1.25rem}
      .cart-header:hover{border-color:transparent}
      .cart-product{display:flex;gap:.75rem;align-items:center}
      .cart-product img{width:56px;height:56px;object-fit:cover;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg-2)}
      .cart-product-title{font-weight:600;font-size:.9rem;color:var(--text);line-height:1.3}
      .cart-price{color:var(--text-2);font-size:.9rem}
      .cart-qty{display:flex;align-items:center;gap:.4rem}
      .cart-qty span{font-weight:700;min-width:20px;text-align:center;color:var(--text)}
      .qty-btn{width:28px;height:28px;display:flex;align-items:center;justify-content:center;background:var(--bg-3);border:1px solid var(--border);border-radius:6px;cursor:pointer;color:var(--text-2);font-size:1rem;transition:all var(--transition)}
      .qty-btn:hover{border-color:var(--primary);color:var(--primary-light)}
      .cart-total{font-weight:700;color:var(--primary-light);font-family:var(--font-display)}
      .btn-remove{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:#f87171;padding:.35rem .75rem;border-radius:var(--radius-sm);cursor:pointer;font-size:.8rem;font-weight:600;transition:all var(--transition);font-family:var(--font-body)}
      .btn-remove:hover{background:rgba(239,68,68,.2);border-color:#f87171}
      .cart-summary-box{margin-top:1.5rem;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;display:flex;flex-direction:column;gap:.75rem}
      .summary-row{display:flex;justify-content:space-between;align-items:center;color:var(--text-2);font-size:.9rem}
      .summary-row.total{border-top:1px solid var(--border);padding-top:.75rem;margin-top:.25rem}
      .summary-row.total span:first-child{font-weight:700;color:var(--text);font-size:1rem}
      .summary-row.total span:last-child{font-family:var(--font-display);font-size:1.4rem;font-weight:800;color:var(--primary-light)}
      .cart-actions{display:flex;gap:.75rem;margin-top:1rem;justify-content:flex-end}
      .empty-cart{text-align:center;padding:4rem 2rem;color:var(--text-3)}
      .empty-cart .empty-icon{font-size:3rem;margin-bottom:1rem}
      .empty-cart h2{font-family:var(--font-display);font-size:1.3rem;color:var(--text);margin-bottom:.5rem}
      .empty-cart p{font-size:.9rem;margin-bottom:1.5rem}
      @media(max-width:768px){
        .cart-row{grid-template-columns:1fr;gap:.5rem}
        .cart-header{display:none}
        .cart-actions{flex-direction:column}
        .cart-actions .btn{width:100%}
      }
    </style>
  </head>
  <body>
    <header id="site-navbar"></header>
    <main class="container">
      <div class="cart-page-header">
        <h1>Your Cart</h1>
      </div>
      <div id="cartContainer" class="cart-container">
        <div class="loading">Loading cart...</div>
      </div>
      <div class="cart-actions">
        <button id="clearCartBtn" class="btn btn-ghost">Clear Cart</button>
        <button id="checkoutBtn" class="btn btn-primary">Proceed to Checkout &#8594;</button>
      </div>
    </main>
    <footer id="site-footer"></footer>
    <script type="module" src="./js/main.js"></script>
    <script type="module" src="./js/cart.js"></script>
  </body>
</html>
