<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Chat — CampusCart</title>
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/layout.css" />
    <link rel="stylesheet" href="css/components.css" />
    <style>
      main.container { max-width: 1000px; padding-top: 1.5rem; padding-bottom: 2rem; }

      .chat-page-header { margin-bottom: 1.25rem; }
      .chat-page-header h1 { font-family: var(--font-display); font-size: 1.5rem; font-weight: 800; color: var(--text); letter-spacing: -.03em; }

      .chat-wrapper {
        display: grid;
        grid-template-columns: 1fr 280px;
        gap: 1.25rem;
        height: calc(100vh - 200px);
        min-height: 500px;
      }

      /* ── Chat Panel ── */
      .chat-panel {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      .chat-header {
        padding: 1rem 1.25rem;
        border-bottom: 1px solid var(--border);
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-shrink: 0;
      }
      .chat-header-info h2 { font-family: var(--font-display); font-size: 1rem; font-weight: 700; color: var(--text); margin: 0; }
      .chat-header-info p { font-size: .78rem; color: var(--text-3); margin: .2rem 0 0; }

      .status-dot {
        display: inline-flex;
        align-items: center;
        gap: .4rem;
        font-size: .78rem;
        font-weight: 600;
        padding: .25rem .75rem;
        border-radius: 999px;
        background: rgba(34,197,94,.1);
        color: #4ade80;
        border: 1px solid rgba(34,197,94,.2);
      }
      .status-dot.disconnected { background: rgba(239,68,68,.1); color: #f87171; border-color: rgba(239,68,68,.2); }
      .status-dot.connecting { background: rgba(245,158,11,.1); color: #fbbf24; border-color: rgba(245,158,11,.2); }

      /* Messages area */
      .messages {
        flex: 1;
        overflow-y: auto;
        padding: 1.25rem;
        display: flex;
        flex-direction: column;
        gap: .75rem;
      }
      .messages::-webkit-scrollbar { width: 4px; }
      .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 99px; }

      .message {
        max-width: 72%;
        display: flex;
        flex-direction: column;
        gap: .2rem;
      }
      .message-bubble {
        padding: .65rem .9rem;
        border-radius: 16px;
        font-size: .9rem;
        line-height: 1.5;
        word-break: break-word;
      }
      .msg-outgoing { align-self: flex-end; align-items: flex-end; }
      .msg-outgoing .message-bubble {
        background: var(--primary);
        color: #fff;
        border-bottom-right-radius: 4px;
      }
      .msg-incoming { align-self: flex-start; align-items: flex-start; }
      .msg-incoming .message-bubble {
        background: var(--bg-3);
        color: var(--text);
        border: 1px solid var(--border);
        border-bottom-left-radius: 4px;
      }
      .msg-meta { font-size: .72rem; color: var(--text-3); padding: 0 .25rem; }
      .optimistic .message-bubble { opacity: .7; }

      /* Input */
      .chat-input-area {
        padding: 1rem 1.25rem;
        border-top: 1px solid var(--border);
        flex-shrink: 0;
      }
      .chat-input {
        display: flex;
        gap: .6rem;
        align-items: center;
      }
      .chat-input input {
        flex: 1;
        padding: .7rem 1rem;
        background: var(--bg-3);
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        color: var(--text);
        font-size: .9rem;
        outline: none;
        transition: border-color var(--transition);
      }
      .chat-input input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-glow); }
      .chat-input input::placeholder { color: var(--text-3); }
      .send-btn {
        padding: .7rem 1.1rem;
        background: var(--primary);
        color: #fff;
        border: none;
        border-radius: var(--radius-sm);
        cursor: pointer;
        font-weight: 600;
        font-size: .9rem;
        transition: all var(--transition);
        white-space: nowrap;
      }
      .send-btn:hover { background: var(--primary-light); }

      /* ── Side Panel ── */
      .side-panel {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 1.25rem;
        display: flex;
        flex-direction: column;
        gap: 1rem;
        overflow-y: auto;
      }
      .side-panel h3 {
        font-family: var(--font-display);
        font-size: .85rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: .08em;
        color: var(--text-3);
        margin: 0;
      }
      .info-item { display: flex; flex-direction: column; gap: .2rem; }
      .info-item .info-label { font-size: .75rem; color: var(--text-3); font-weight: 600; text-transform: uppercase; letter-spacing: .06em; }
      .info-item .info-value { font-size: .88rem; color: var(--text); font-weight: 500; }
      .participant-chip {
        display: flex;
        align-items: center;
        gap: .5rem;
        background: var(--bg-3);
        border: 1px solid var(--border);
        border-radius: var(--radius-sm);
        padding: .5rem .75rem;
        font-size: .85rem;
        color: var(--text-2);
      }
      .participant-avatar {
        width: 28px; height: 28px;
        border-radius: 50%;
        background: var(--primary-glow);
        border: 1px solid rgba(108,99,255,.3);
        display: flex; align-items: center; justify-content: center;
        font-size: .75rem; font-weight: 700; color: var(--primary-light);
        flex-shrink: 0;
      }

      @media (max-width: 768px) {
        .chat-wrapper { grid-template-columns: 1fr; height: auto; }
        .chat-panel { height: 70vh; }
        .side-panel { display: none; }
      }
    </style>
  </head>
  <body>
    <header id="site-navbar"></header>
    <main class="container">
      <div class="chat-page-header">
        <h1>💬 Chat</h1>
      </div>
      <div class="chat-wrapper">

        <!-- Chat Panel -->
        <section class="chat-panel" id="chatPanel">
          <div class="chat-header">
            <div class="chat-header-info">
              <h2 id="convTitle">Conversation</h2>
              <p id="convMeta"></p>
            </div>
            <div id="statusBadge" class="status-dot connecting">Connecting...</div>
          </div>

          <div id="messages" class="messages">
            <div class="empty">Loading messages...</div>
          </div>

          <div class="chat-input-area">
            <form id="sendForm" class="chat-input">
              <input id="messageInput" type="text" placeholder="Write a message..." autocomplete="off" />
              <button type="submit" class="send-btn">Send ➤</button>
            </form>
          </div>
        </section>

        <!-- Side Panel -->
        <aside class="side-panel">
          <h3>Conversation Info</h3>
          <div id="infoList">
            <div style="color:var(--text-3);font-size:.85rem">Loading...</div>
          </div>
        </aside>

      </div>
    </main>
    <footer id="site-footer"></footer>
    <script type="module" src="js/main.js"></script>
    <script type="module" src="js/chat.js"></script>
  </body>
</html>
