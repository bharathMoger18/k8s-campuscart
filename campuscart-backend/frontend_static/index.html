<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>CampusCart — Products</title>
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/layout.css" />
    <link rel="stylesheet" href="css/components.css" />
    <link rel="stylesheet" href="css/theme.css" />
    <style>
      .hero{padding:3rem 0 2rem;text-align:center}
      .hero-tag{display:inline-block;background:var(--primary-glow);color:var(--primary-light);border:1px solid rgba(108,99,255,.3);padding:.3rem .9rem;border-radius:999px;font-size:.8rem;font-weight:600;letter-spacing:.08em;text-transform:uppercase;margin-bottom:1rem}
      .hero h1{font-family:var(--font-display);font-size:clamp(2rem,5vw,3.2rem);font-weight:800;line-height:1.1;letter-spacing:-.03em;color:var(--text);margin-bottom:.75rem}
      .hero h1 span{background:linear-gradient(135deg,var(--primary-light),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
      .hero p{color:var(--text-2);font-size:1.05rem;max-width:480px;margin:0 auto}
      .filter-bar{display:flex;align-items:center;gap:.75rem;background:var(--bg-2);border:1px solid var(--border);border-radius:var(--radius-lg);padding:.65rem 1rem;margin-bottom:2rem}
      .filter-bar input[type=search]{flex:2;min-width:0;background:var(--bg-3);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);padding:.6rem 1rem;font-size:.9rem;outline:none;transition:all var(--transition)}
      .filter-bar input[type=search]:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-glow)}
      .filter-bar input[type=search]::placeholder{color:var(--text-3)}
      .filter-bar select{flex:1;min-width:0;background:var(--bg-3);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);padding:.6rem .9rem;font-size:.9rem;outline:none;cursor:pointer;transition:all var(--transition)}
      .filter-bar select:focus{border-color:var(--primary)}
      .filter-bar select option{background:var(--bg-3)}
      .filter-actions{display:flex;gap:.5rem;flex-shrink:0}
      .products-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.25rem}
      .products-header h2{font-family:var(--font-display);font-size:1.1rem;font-weight:700;color:var(--text)}
      .products-count{font-size:.85rem;color:var(--text-3)}
      @media(max-width:768px){
        .filter-bar{flex-direction:column;align-items:stretch}
        .filter-bar input[type=search],.filter-bar select{width:100%;flex:unset}
        .filter-actions{width:100%}
        .filter-actions .btn{flex:1}
        .hero{padding:2rem 0 1.5rem}
        .hero h1{font-size:1.8rem}
      }
      @media(max-width:480px){
        .product-grid{grid-template-columns:repeat(2,1fr)!important;gap:.75rem}
        .product-title{font-size:.88rem}
        .price{font-size:.95rem}
      }
    </style>
  </head>
  <body>
    <header id="site-navbar"></header>
    <main class="container">
      <section class="hero">
        <div class="hero-tag">🎓 Campus Marketplace</div>
        <h1>Buy &amp; Sell on <span>Campus</span></h1>
        <p>Find textbooks, electronics, accessories and more from students like you.</p>
      </section>

      <div class="filter-bar">
        <input id="searchInput" type="search" placeholder="🔍  Search products..." aria-label="Search products" />
        <select id="categorySelect" aria-label="Filter by category">
          <option value="">All Categories</option>
          <option value="Electronics">Electronics</option>
          <option value="Books">Books</option>
          <option value="Clothing">Clothing</option>
          <option value="Accessories">Accessories</option>
        </select>
        <select id="sortSelect" aria-label="Sort products">
          <option value="">Sort By</option>
          <option value="price">Price: Low → High</option>
          <option value="-price">Price: High → Low</option>
          <option value="-average_rating">Top Rated</option>
          <option value="-date_joined">Newest</option>
        </select>
        <div class="filter-actions">
          <button id="filterBtn" class="btn btn-primary">Apply</button>
          <button id="clearFiltersBtn" class="btn btn-ghost">Clear</button>
        </div>
      </div>

      <div class="products-header">
        <h2>All Products</h2>
        <span class="products-count" id="productsCount"></span>
      </div>

      <section id="productGrid" class="product-grid" aria-live="polite"></section>
      <nav id="pagination" class="pagination"></nav>
    </main>

    <footer id="site-footer"></footer>
    <script type="module" src="js/main.js"></script>
    <script type="module" src="js/products.js"></script>
  </body>
</html>
