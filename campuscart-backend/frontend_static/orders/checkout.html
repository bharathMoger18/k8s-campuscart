<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Checkout — CampusCart</title>
    <link rel="stylesheet" href="/css/base.css" />
    <link rel="stylesheet" href="/css/layout.css" />
    <link rel="stylesheet" href="/css/components.css" />
    <link rel="stylesheet" href="/css/theme.css" />
    <style>
      .checkout-page-header{margin-bottom:2rem}
      .checkout-page-header h1{font-family:var(--font-display);font-size:1.8rem;font-weight:800;letter-spacing:-.03em;color:var(--text)}
      .checkout-grid{display:grid;grid-template-columns:1fr 400px;gap:2rem;align-items:start}
      .checkout-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem}
      .checkout-card h2{font-family:var(--font-display);font-size:1.1rem;font-weight:700;color:var(--text);margin-bottom:1.25rem;padding-bottom:.75rem;border-bottom:1px solid var(--border)}
      .checkout-item{display:flex;align-items:center;gap:.75rem;padding:.75rem 0;border-bottom:1px solid var(--border)}
      .checkout-item:last-child{border-bottom:none}
      .checkout-item img{width:52px;height:52px;object-fit:cover;border-radius:var(--radius-sm);border:1px solid var(--border);background:var(--bg-2)}
      .checkout-item-info{flex:1;min-width:0}
      .checkout-item-info strong{display:block;font-size:.9rem;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
      .checkout-item-info span{font-size:.8rem;color:var(--text-3)}
      .checkout-item-price{font-family:var(--font-display);font-weight:700;color:var(--primary-light);font-size:.95rem;white-space:nowrap}
      .checkout-total-row{display:flex;justify-content:space-between;align-items:center;padding-top:1rem;margin-top:.5rem;border-top:1px solid var(--border)}
      .checkout-total-row span:first-child{font-weight:700;color:var(--text)}
      .checkout-total-row span:last-child{font-family:var(--font-display);font-size:1.4rem;font-weight:800;color:var(--primary-light)}
      .payment-option{display:flex;align-items:center;gap:.75rem;padding:.9rem 1rem;border:1px solid var(--border);border-radius:var(--radius-sm);cursor:pointer;transition:all var(--transition);margin-bottom:.6rem}
      .payment-option:hover{border-color:var(--primary)}
      .payment-option input[type=radio]{accent-color:var(--primary);width:16px;height:16px}
      .payment-option label{cursor:pointer;font-weight:600;color:var(--text);font-size:.9rem}
      .payment-option .pay-desc{font-size:.78rem;color:var(--text-3);margin-top:.1rem}
      .payment-option.selected{border-color:var(--primary);background:var(--primary-glow)}
      .place-order-btn{width:100%;padding:.9rem;font-size:1rem;font-weight:700;margin-top:1rem}
      .cod-notice{background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.2);border-radius:var(--radius-sm);padding:.75rem 1rem;font-size:.85rem;color:#4ade80;margin-top:.75rem}
      @media(max-width:900px){
        .checkout-grid{grid-template-columns:1fr}
      }
    </style>
  </head>
  <body>
    <header id="site-navbar"></header>
    <main class="container">
      <div class="checkout-page-header">
        <h1>Checkout</h1>
      </div>
      <div class="checkout-grid">

        <!-- Left: Form -->
        <div>
          <div class="checkout-card" style="margin-bottom:1.25rem">
            <h2>Shipping Details</h2>
            <div class="form-group">
              <label for="address">Delivery Address</label>
              <textarea id="address" rows="3" placeholder="Enter your full delivery address including city and PIN code..."></textarea>
            </div>
          </div>

          <div class="checkout-card">
            <h2>Payment Method</h2>
            <div class="payment-option selected" id="opt-cod">
              <input type="radio" name="payment" id="pay-cod" value="cod" checked />
              <div>
                <label for="pay-cod">💵 Cash on Delivery</label>
                <div class="pay-desc">Pay when your order arrives</div>
              </div>
            </div>
            <div class="payment-option" id="opt-card">
              <input type="radio" name="payment" id="pay-card" value="card" />
              <div>
                <label for="pay-card">💳 Online Payment</label>
                <div class="pay-desc">Pay securely via card or UPI</div>
              </div>
            </div>
            <div class="cod-notice" id="codNotice">
              ✅ You will pay cash when the order is delivered to you.
            </div>
          </div>
        </div>

        <!-- Right: Summary -->
        <div>
          <div class="checkout-card">
            <h2>Order Summary</h2>
            <div id="checkoutSummary">
              <div class="loading">Loading summary...</div>
            </div>
          </div>
          <button id="placeOrderBtn" class="btn btn-primary place-order-btn">
            Place Order &#8594;
          </button>
        </div>

      </div>
    </main>
    <footer id="site-footer"></footer>
    <script type="module" src="/js/main.js"></script>
    <script type="module" src="/js/checkout.js"></script>
    <script>
      document.querySelectorAll('input[name=payment]').forEach(radio => {
        radio.addEventListener('change', () => {
          document.querySelectorAll('.payment-option').forEach(o => o.classList.remove('selected'));
          radio.closest('.payment-option').classList.add('selected');
          const notice = document.getElementById('codNotice');
          if (radio.value === 'cod') {
            notice.style.display = 'block';
            notice.textContent = '✅ You will pay cash when the order is delivered to you.';
          } else {
            notice.style.display = 'block';
            notice.style.background = 'rgba(108,99,255,0.08)';
            notice.style.borderColor = 'rgba(108,99,255,0.2)';
            notice.style.color = 'var(--primary-light)';
            notice.textContent = '🔒 You will be redirected to a secure payment page.';
          }
        });
      });
    </script>
  </body>
</html>
