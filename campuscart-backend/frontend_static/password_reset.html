<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Password Reset — CampusCart</title>
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/components.css" />
    <link rel="stylesheet" href="css/auth.css" />
  </head>
  <body>
    <main class="auth-container">
      <div class="auth-wrapper">
        <div class="auth-logo">
          <a href="/index.html">CampusCart</a>
        </div>
        <div class="auth-card">
          <div class="auth-hero">
            <div class="auth-icon">🔑</div>
            <h1>Reset password</h1>
            <p>Enter your email and we'll send you a reset link.</p>
          </div>
          <form id="passwordResetForm" class="auth-grid" novalidate>
            <div class="form-group">
              <label for="email">Email Address</label>
              <input id="email" type="email" placeholder="you@college.edu" required />
            </div>
            <button id="passwordResetBtn" class="btn btn-primary primary-cta" type="submit">
              Send Reset Link
            </button>
          </form>
          <p class="form-footer">
            <a href="/login.html">&#8592; Back to Login</a>
          </p>
        </div>
        <p class="auth-bottom">© 2026 CampusCart — Built for students</p>
      </div>
    </main>
    <script type="module" src="js/auth/password_reset.js"></script>
  </body>
</html>
