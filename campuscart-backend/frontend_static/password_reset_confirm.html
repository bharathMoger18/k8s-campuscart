<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Set New Password — CampusCart</title>
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/components.css" />
    <link rel="stylesheet" href="css/auth.css" />
  </head>
  <body>
    <main class="auth-container">
      <div class="auth-wrapper">
        <div class="auth-logo">
          <a href="/index.html">CampusCart</a>
        </div>
        <div class="auth-card">
          <div class="auth-hero">
            <div class="auth-icon">🔒</div>
            <h1>Set new password</h1>
            <p>Enter a new password to finish resetting your account.</p>
          </div>
          <form id="passwordResetConfirmForm" class="auth-grid" novalidate>
            <div class="form-group">
              <label for="password">New Password</label>
              <div class="input-wrapper">
                <input id="password" type="password" placeholder="Min 8 characters" required />
                <button type="button" class="toggle-password" onclick="
                  const i=document.getElementById('password');
                  i.type=i.type==='password'?'text':'password';
                  this.textContent=i.type==='password'?'👁':'🙈';
                ">👁</button>
              </div>
            </div>
            <div class="form-group">
              <label for="password2">Confirm Password</label>
              <div class="input-wrapper">
                <input id="password2" type="password" placeholder="Re-enter password" required />
                <button type="button" class="toggle-password" onclick="
                  const i=document.getElementById('password2');
                  i.type=i.type==='password'?'text':'password';
                  this.textContent=i.type==='password'?'👁':'🙈';
                ">👁</button>
              </div>
            </div>
            <button id="passwordResetConfirmBtn" class="btn btn-primary primary-cta" type="submit">
              Set New Password
            </button>
          </form>
          <p class="form-footer">
            <a href="/login.html">&#8592; Back to Login</a>
          </p>
        </div>
        <p class="auth-bottom">© 2026 CampusCart — Built for students</p>
      </div>
    </main>
    <script type="module" src="js/auth/password_reset_confirm.js"></script>
  </body>
</html>
