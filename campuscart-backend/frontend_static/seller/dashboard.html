<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Seller Dashboard — CampusCart</title>
    <link rel="stylesheet" href="../css/base.css" />
    <link rel="stylesheet" href="../css/layout.css" />
    <link rel="stylesheet" href="../css/components.css" />
    <script type="module" src="../js/main.js" defer></script>
    <script type="module" src="./js/dashboard.js" defer></script>
    <style>
      .dash-header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem;margin-bottom:2rem}
      .dash-header h1{font-family:var(--font-display);font-size:1.8rem;font-weight:800;letter-spacing:-.03em;color:var(--text)}
      .dash-header-actions{display:flex;gap:.5rem;flex-wrap:wrap}

      /* Stat Cards */
      #seller-summary{display:grid;gap:1rem;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));margin-bottom:2rem}
      .stat-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem 1.5rem;transition:border-color var(--transition);position:relative;overflow:hidden}
      .stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--primary),var(--primary-light))}
      .stat-card:hover{border-color:rgba(108,99,255,.3)}
      .stat-card .label{font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--text-3);margin-bottom:.5rem}
      .stat-card .value{font-family:var(--font-display);font-size:2rem;font-weight:800;color:var(--text);line-height:1}
      .stat-card .sublabel{font-size:.8rem;color:var(--text-3);margin-top:.4rem}

      /* Two col */
      .two-col{display:grid;grid-template-columns:1fr 340px;gap:1rem;margin-bottom:2rem}

      /* Card */
      .dash-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem}
      .dash-card h3{font-family:var(--font-display);font-size:1rem;font-weight:700;color:var(--text);margin-bottom:1rem}

      /* Top products */
      .top-products{display:flex;flex-direction:column;gap:.6rem}
      .top-product{display:flex;gap:.75rem;align-items:center;padding:.6rem;border-radius:var(--radius-sm);background:var(--bg-3);border:1px solid var(--border)}
      .top-product img{width:48px;height:48px;object-fit:cover;border-radius:var(--radius-sm);border:1px solid var(--border)}
      .top-product-info{flex:1;min-width:0}
      .top-product-title{font-weight:600;font-size:.88rem;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
      .top-product-meta{font-size:.78rem;color:var(--text-3);margin-top:.15rem}

      /* Refund summary */
      .refund-list{display:flex;flex-direction:column;gap:.6rem}
      .refund-row{display:flex;justify-content:space-between;align-items:center;padding:.5rem 0;border-bottom:1px solid var(--border);font-size:.9rem}
      .refund-row:last-child{border-bottom:none}
      .refund-row span:first-child{color:var(--text-2)}
      .refund-row span:last-child{font-weight:700;color:var(--text)}

      /* Chart */
      .chart-section{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.5rem;margin-bottom:2rem}
      .chart-section h2{font-family:var(--font-display);font-size:1rem;font-weight:700;color:var(--text);margin-bottom:1.25rem}

      /* Table */
      .dash-section h2{font-family:var(--font-display);font-size:1rem;font-weight:700;color:var(--text);margin-bottom:1rem}
      .data-table{width:100%;border-collapse:collapse;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
      .data-table thead{background:var(--bg-2)}
      .data-table th{padding:.75rem 1rem;text-align:left;font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text-3);border-bottom:1px solid var(--border)}
      .data-table td{padding:.85rem 1rem;font-size:.88rem;color:var(--text-2);border-bottom:1px solid var(--border)}
      .data-table tr:last-child td{border-bottom:none}
      .data-table tr:hover td{background:var(--bg-2)}
      .data-table a{color:var(--primary-light);font-weight:600}

      /* Status badges */
      .status-badge{display:inline-block;padding:.25rem .65rem;border-radius:999px;font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em}
      .status-pending{background:rgba(245,158,11,.12);color:#fbbf24;border:1px solid rgba(245,158,11,.2)}
      .status-paid{background:rgba(34,197,94,.12);color:#4ade80;border:1px solid rgba(34,197,94,.2)}
      .status-shipped{background:rgba(108,99,255,.12);color:var(--primary-light);border:1px solid rgba(108,99,255,.2)}
      .status-delivered{background:rgba(34,197,94,.12);color:#4ade80;border:1px solid rgba(34,197,94,.2)}
      .status-cancelled{background:rgba(239,68,68,.12);color:#f87171;border:1px solid rgba(239,68,68,.2)}
      .status-refund_requested{background:rgba(245,158,11,.12);color:#fbbf24;border:1px solid rgba(245,158,11,.2)}
      .status-refunded{background:rgba(239,68,68,.12);color:#f87171;border:1px solid rgba(239,68,68,.2)}

      @media(max-width:900px){
        .two-col{grid-template-columns:1fr}
        .dash-header{flex-direction:column;align-items:flex-start}
      }
      @media(max-width:600px){
        .data-table th,.data-table td{padding:.6rem .75rem;font-size:.8rem}
        .stat-card .value{font-size:1.5rem}
      }
    </style>
  </head>
  <body>
    <header id="site-navbar"></header>
    <main class="container">

      <div class="dash-header">
        <h1>Seller Dashboard</h1>
        <div class="dash-header-actions">
          <a href="/seller/orders.html" class="btn btn-primary">All Orders</a>
          <a href="./products.html" class="btn btn-ghost">My Products</a>
          <a href="/index.html" class="btn btn-ghost">Back to Store</a>
        </div>
      </div>

      <!-- Stat Cards -->
      <section id="seller-summary">
        <div class="stat-card">
          <div class="label">Total Products</div>
          <div id="totalProducts" class="value">—</div>
          <div class="sublabel">Active listings</div>
        </div>
        <div class="stat-card">
          <div class="label">Total Orders</div>
          <div id="totalOrders" class="value">—</div>
          <div class="sublabel">All time</div>
        </div>
        <div class="stat-card">
          <div class="label">Total Revenue</div>
          <div id="totalRevenue" class="value">—</div>
          <div class="sublabel">Net revenue</div>
        </div>
      </section>

      <!-- Two col -->
      <section class="two-col">
        <div class="dash-card">
          <h3>Refunds Summary</h3>
          <div id="refundsSummary" class="refund-list">
            <div class="loading">Loading...</div>
          </div>
        </div>
        <div class="dash-card">
          <h3>Top Products</h3>
          <div id="topProducts" class="top-products">
            <div style="color:var(--text-3);font-size:.9rem">No data yet</div>
          </div>
        </div>
      </section>

      <!-- Chart -->
      <section class="chart-section">
        <h2>Monthly Sales Overview</h2>
        <canvas id="salesChart" style="max-height:300px;width:100%"></canvas>
      </section>

      <!-- Recent Orders -->
      <section class="dash-section">
        <h2>Recent Orders</h2>
        <table class="data-table">
          <thead>
            <tr>
              <th>Order ID</th>
              <th>Product</th>
              <th>Status</th>
              <th>Total</th>
              <th>Date</th>
            </tr>
          </thead>
          <tbody id="recentOrdersTable">
            <tr><td colspan="5" style="text-align:center;padding:1.5rem;color:var(--text-3)">Loading orders...</td></tr>
          </tbody>
        </table>
      </section>

    </main>
    <footer id="site-footer"></footer>
  </body>
</html>
