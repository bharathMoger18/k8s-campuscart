<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>CampusCart Push Test</title>
  </head>
  <body>
    <h2>CampusCart Web Push Test</h2>
    <button id="subscribeBtn">Subscribe to Notifications</button>

    <script>
      const baseUrl = 'http://127.0.0.1:8000';
      const token =
        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ0b2tlbl90eXBlIjoiYWNjZXNzIiwiZXhwIjoxNzYxNjM1MDAxLCJpYXQiOjE3NjE2MzE0MDEsImp0aSI6IjJjOWM4YTU2MzM1MDRjNzNhMWU2ZTYyOThkNzcwZDg1IiwidXNlcl9pZCI6IjIifQ.drlQn8hnCyQZ8csBi9UcjHvT6UigEgpLi_NpG0r5jSA'; // Paste your JWT token from login

      async function getPublicKey() {
        const res = await fetch(`${baseUrl}/api/v1/push/public_key/`);
        const data = await res.json();
        return data.publicKey;
      }

      async function subscribe() {
        const registration = await navigator.serviceWorker.register('/sw.js');
        console.log('Service Worker registered:', registration);

        const vapidKey = await getPublicKey();
        const convertedKey = urlBase64ToUint8Array(vapidKey);

        const subscription = await registration.pushManager.subscribe({
          userVisibleOnly: true,
          applicationServerKey: convertedKey,
        });

        await fetch(`${baseUrl}/api/v1/push/subscribe/`, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            Authorization: `Bearer ${token}`,
          },
          body: JSON.stringify({
            subscription: {
              endpoint: subscription.endpoint,
              keys: subscription.toJSON().keys,
            },
          }),
        });

        alert('Subscription successful!');
      }

      // helper to convert VAPID key
      function urlBase64ToUint8Array(base64String) {
        const padding = '='.repeat((4 - (base64String.length % 4)) % 4);
        const base64 = (base64String + padding)
          .replace(/-/g, '+')
          .replace(/_/g, '/');
        const rawData = window.atob(base64);
        const outputArray = new Uint8Array(rawData.length);
        for (let i = 0; i < rawData.length; ++i) {
          outputArray[i] = rawData.charCodeAt(i);
        }
        return outputArray;
      }

      document
        .getElementById('subscribeBtn')
        .addEventListener('click', subscribe);
    </script>
  </body>
</html>
