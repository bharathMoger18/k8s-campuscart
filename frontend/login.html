<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Login — CampusCart</title>
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/components.css" />
    <link rel="stylesheet" href="css/auth.css" />
  </head>
  <body>
    <main class="auth-container">
      <div class="auth-wrapper">

        <div class="auth-logo">
          <a href="/index.html">CampusCart</a>
        </div>

        <div class="auth-card">
          <div class="auth-hero">
            <div class="auth-icon">🔐</div>
            <h1>Welcome back</h1>
            <p>Sign in to your CampusCart account</p>
          </div>

          <form id="loginForm" class="auth-grid" novalidate>
            <div class="form-group">
              <label for="email">Email address</label>
              <input id="email" type="email" placeholder="you@college.edu" autocomplete="email" required />
            </div>
            <div class="form-group">
              <label for="password">Password</label>
              <div class="input-wrapper">
                <input id="password" type="password" placeholder="••••••••" autocomplete="current-password" required />
                <button type="button" class="toggle-password" onclick="
                  const inp = document.getElementById('password');
                  inp.type = inp.type === 'password' ? 'text' : 'password';
                  this.textContent = inp.type === 'password' ? '👁' : '🙈';
                ">👁</button>
              </div>
            </div>
            <button id="loginBtn" class="btn btn-primary primary-cta" type="submit">
              Sign In
            </button>
          </form>

          <a href="/admin/" target="_blank" class="btn btn-ghost" style="width:100%;text-align:center;margin-top:.75rem;display:block">
            🔒 Admin Login
          </a>

          <p class="form-footer">
            <a href="/password_reset.html">Forgot password?</a>
            <span class="divider">·</span>
            <a href="/register.html">Create account</a>
          </p>
        </div>

        <p class="auth-bottom">© 2026 CampusCart — Built for students</p>
      </div>
    </main>
    <script type="module" src="js/auth/login.js"></script>
  </body>
</html>
