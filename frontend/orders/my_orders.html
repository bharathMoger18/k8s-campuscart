<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>My Orders — CampusCart</title>
    <link rel="stylesheet" href="/css/base.css" />
    <link rel="stylesheet" href="/css/layout.css" />
    <link rel="stylesheet" href="/css/components.css" />
    <link rel="stylesheet" href="/css/theme.css" />
    <style>
      .orders-page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:2rem}
      .orders-page-header h1{font-family:var(--font-display);font-size:1.8rem;font-weight:800;letter-spacing:-.03em;color:var(--text)}
      .orders-list{display:flex;flex-direction:column;gap:1rem}
      .order-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:1.25rem 1.5rem;transition:border-color var(--transition)}
      .order-card:hover{border-color:rgba(108,99,255,.25)}
      .order-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:.75rem;flex-wrap:wrap;gap:.5rem}
      .order-id{font-family:var(--font-display);font-weight:700;font-size:1rem;color:var(--text)}
      .order-status{padding:.25rem .75rem;border-radius:999px;font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em}
      .order-status.pending{background:rgba(245,158,11,.12);color:#fbbf24;border:1px solid rgba(245,158,11,.2)}
      .order-status.shipped{background:rgba(108,99,255,.12);color:var(--primary-light);border:1px solid rgba(108,99,255,.2)}
      .order-status.delivered{background:rgba(34,197,94,.12);color:#4ade80;border:1px solid rgba(34,197,94,.2)}
      .order-status.cancelled{background:rgba(239,68,68,.12);color:#f87171;border:1px solid rgba(239,68,68,.2)}
      .order-body{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.75rem;margin-bottom:1rem}
      .order-info{display:flex;flex-direction:column;gap:.25rem}
      .order-product-name{font-weight:600;color:var(--text);font-size:.95rem}
      .order-meta{font-size:.82rem;color:var(--text-3)}
      .order-price{font-family:var(--font-display);font-size:1.2rem;font-weight:800;color:var(--primary-light)}
      .order-actions{display:flex;gap:.5rem;flex-wrap:wrap;padding-top:.75rem;border-top:1px solid var(--border)}
      .order-actions .btn{padding:.4rem .9rem;font-size:.85rem}
      .empty-orders{text-align:center;padding:4rem 2rem;color:var(--text-3)}
      .empty-orders .empty-icon{font-size:3rem;margin-bottom:1rem}
      .empty-orders h2{font-family:var(--font-display);font-size:1.3rem;color:var(--text);margin-bottom:.5rem}
      .empty-orders p{font-size:.9rem;margin-bottom:1.5rem}
      @media(max-width:600px){
        .order-body{flex-direction:column;align-items:flex-start}
      }
    </style>
  </head>
  <body>
    <header id="site-navbar"></header>
    <main class="container">
      <div class="orders-page-header">
        <h1>My Orders</h1>
      </div>
      <section id="ordersList" class="orders-list">
        <div class="loading">Loading your orders...</div>
      </section>
    </main>
    <footer id="site-footer"></footer>
    <script type="module" src="/js/main.js"></script>
    <script type="module" src="/orders/js/my_orders.js"></script>
  </body>
</html>
