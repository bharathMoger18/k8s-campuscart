<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Register — CampusCart</title>
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/components.css" />
    <link rel="stylesheet" href="css/auth.css" />
  </head>
  <body>
    <main class="auth-container">
      <div class="auth-wrapper">
        <div class="auth-card">
          <div class="auth-hero">
            <h1>Create your account</h1>
            <p>Join CampusCart — buy and sell on campus</p>
          </div>

          <form id="registerForm" class="auth-grid" novalidate>
            <div class="form-group">
              <label for="name">Full name *</label>
              <input id="name" type="text" autocomplete="name" required />
            </div>

            <div class="form-group">
              <label for="email">Email *</label>
              <input id="email" type="email" autocomplete="email" required />
            </div>

            <div class="form-group">
              <label for="password">Password *</label>
              <input
                id="password"
                type="password"
                autocomplete="new-password"
                required
              />
              <small class="muted"
                >Minimum 8 characters, include uppercase, number & special
                char.</small
              >
            </div>

            <div class="form-group">
              <label for="password2">Confirm Password *</label>
              <input
                id="password2"
                type="password"
                autocomplete="new-password"
                required
              />
            </div>

            <div class="form-group">
              <label for="campus">Campus (optional)</label>
              <input id="campus" type="text" />
            </div>

            <div class="form-group">
              <label for="phone">Phone (optional)</label>
              <input id="phone" type="text" />
            </div>

            <button
              id="registerBtn"
              class="btn btn-primary primary-cta"
              type="submit"
            >
              Register
            </button>
          </form>

          <p class="form-footer">
            Already registered? <a href="/login.html">Login</a>
          </p>
        </div>
      </div>
    </main>

    <script type="module" src="js/auth/register.js"></script>
  </body>
</html>
