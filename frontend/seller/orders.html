<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Seller Orders — CampusCart</title>
    <link rel="stylesheet" href="/css/base.css" />
    <link rel="stylesheet" href="/css/layout.css" />
    <link rel="stylesheet" href="/css/components.css" />
    <script type="module" src="/js/main.js" defer></script>
    <script type="module" src="/seller/js/orders.js" defer></script>
    <style>
      .page-header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:1rem;margin-bottom:1.5rem}
      .page-header h1{font-family:var(--font-display);font-size:1.8rem;font-weight:800;letter-spacing:-.03em;color:var(--text)}
      .controls{display:flex;gap:.75rem;align-items:center;margin-bottom:1.25rem;flex-wrap:wrap}
      .controls input{flex:1;min-width:220px;background:var(--bg-3);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);padding:.65rem 1rem;font-size:.9rem;outline:none;transition:border-color var(--transition)}
      .controls input:focus{border-color:var(--primary)}
      .controls select{background:var(--bg-3);border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text);padding:.65rem .9rem;font-size:.9rem;outline:none;cursor:pointer}
      .data-table{width:100%;border-collapse:collapse;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden}
      .data-table thead{background:var(--bg-2)}
      .data-table th{padding:.75rem 1rem;text-align:left;font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--text-3);border-bottom:1px solid var(--border)}
      .data-table td{padding:.85rem 1rem;font-size:.88rem;color:var(--text-2);border-bottom:1px solid var(--border)}
      .data-table tr:last-child td{border-bottom:none}
      .data-table tr:hover td{background:var(--bg-2)}
      .data-table a{color:var(--primary-light);font-weight:600}
      .status-badge{display:inline-block;padding:.25rem .65rem;border-radius:999px;font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em}
      .status-pending{background:rgba(245,158,11,.12);color:#fbbf24;border:1px solid rgba(245,158,11,.2)}
      .status-paid{background:rgba(34,197,94,.12);color:#4ade80;border:1px solid rgba(34,197,94,.2)}
      .status-shipped{background:rgba(108,99,255,.12);color:var(--primary-light);border:1px solid rgba(108,99,255,.2)}
      .status-delivered{background:rgba(34,197,94,.12);color:#4ade80;border:1px solid rgba(34,197,94,.2)}
      .status-cancelled{background:rgba(239,68,68,.12);color:#f87171;border:1px solid rgba(239,68,68,.2)}
      .status-refund_requested{background:rgba(245,158,11,.12);color:#fbbf24;border:1px solid rgba(245,158,11,.2)}
      .status-refunded{background:rgba(239,68,68,.12);color:#f87171;border:1px solid rgba(239,68,68,.2)}
      .actions .btn{padding:.3rem .7rem;font-size:.78rem;margin-right:.35rem}
      .pagination{margin-top:1.25rem;display:flex;gap:.5rem;align-items:center;justify-content:center}
      @media(max-width:720px){
        .controls{flex-direction:column}
        .controls input,.controls select{width:100%}
        .data-table th:nth-child(3),.data-table td:nth-child(3),
        .data-table th:nth-child(6),.data-table td:nth-child(6){display:none}
      }
    </style>
  </head>
  <body>
    <header id="site-navbar"></header>
    <main class="container">
      <div class="page-header">
        <h1>Seller Orders</h1>
        <a class="btn btn-ghost" href="/seller/dashboard.html">&#8592; Dashboard</a>
      </div>
      <div class="controls">
        <input id="searchInput" placeholder="&#128269; Search by order ID, product or buyer..." />
        <select id="statusFilter">
          <option value="">All Status</option>
          <option value="PENDING">Pending</option>
          <option value="PAID">Paid</option>
          <option value="SHIPPED">Shipped</option>
          <option value="DELIVERED">Delivered</option>
          <option value="CANCELLED">Cancelled</option>
          <option value="REFUND_REQUESTED">Refund Requested</option>
          <option value="REFUNDED">Refunded</option>
        </select>
      </div>
      <table class="data-table" id="ordersTable">
        <thead>
          <tr>
            <th>Order ID</th>
            <th>Buyer</th>
            <th>Product</th>
            <th>Status</th>
            <th>Total</th>
            <th>Date</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="ordersTableBody">
          <tr><td colspan="7" style="text-align:center;padding:2rem;color:var(--text-3)">Loading orders...</td></tr>
        </tbody>
      </table>
      <div class="pagination" id="pagination"></div>
    </main>
    <footer id="site-footer"></footer>
  </body>
</html>
