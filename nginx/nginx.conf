limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

upstream campuscart_backend {
	server web:8000 max_fails=3 fail_timeout=30s;
	keepalive 32;
	keepalive_timeout 60s;
	keepalive_requests 1000;
}

server {
	listen 80;
	server_name localhost;
	server_tokens off;
	gzip on;
	gzip_types text/css application/javascript application/json text/plain application/xml;
	gzip_min_length 1024;
	gzip_comp_level 5;
	add_header X-XSS-Protection "1; mode=block";
	add_header Content-Security-Policy "default-src 'self' https://js.stripe.com; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://js.stripe.com; style-src 'self' 'unsafe-inline'; frame-src https://js.stripe.com; connect-src 'self' http://localhost:8080;";
	client_max_body_size 20M;
	proxy_read_timeout 60s;
	proxy_connect_timeout 10s;
	proxy_send_timeout 60s;		
	client_body_timeout 12s;
	client_header_timeout 12s;
	proxy_buffer_size 8k;
	proxy_buffers 8 8k;

	access_log /dev/stdout;
	error_log /dev/stderr warn;


	root /app/frontend;
	index index.html;

	location / {
		try_files $uri $uri/ =404;
	}

	location /api/v1/ {
		limit_req zone=api burst=20 nodelay;

		proxy_pass http://campuscart_backend;
		proxy_http_version 1.1;
		proxy_set_header Connection "";
		proxy_set_header Host $host;
		proxy_set_header X-Real-IP $remote_addr;
		proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
		proxy_set_header X-Forwarded-Proto $scheme;
	}

	location /media/ {
		alias /app/media/;
	}

	location /ws/ {
		proxy_pass http://campuscart_backend;
		proxy_http_version 1.1;
		proxy_set_header Upgrade $http_upgrade;
		proxy_set_header Connection "upgrade";
		proxy_set_header Host $host;
	}

	location /static/ {
		alias /app/staticfiles/;
	}

	location /admin/ {
	    proxy_pass http://campuscart_backend;
	    proxy_http_version 1.1;
            proxy_set_header Connection "";
	    proxy_set_header Host $host;
	    proxy_set_header X-Real-IP $remote_addr;
	    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
	}
}